<!DOCTYPE html>
<html>
<head>
    <title>HIERARCHY | Sovereign Asset Portal</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b1120; color: #f8fafc; padding: 40px; }
        .header { border-bottom: 1px solid #1e293b; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        .tag { font-size: 10px; background: #38bdf8; color: #0b0f1a; padding: 2px 6px; border-radius: 4px; margin-right: 8px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; background: #161e2e; border-radius: 12px; overflow: hidden; }
        th { text-align: left; padding: 20px; color: #94a3b8; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #1e293b; letter-spacing: 1px; }
        td { padding: 20px; border-bottom: 1px solid #1e293b; font-size: 14px; }
        tr:hover { background: #1f2937; }
        .fee-pill { background: #064e3b; color: #34d399; padding: 4px 12px; border-radius: 99px; font-weight: bold; font-size: 12px; }
        .stale { color: #f59e0b; font-weight: bold; }
        .sync-info { font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 style="margin:0; letter-spacing: 3px;">HIERARCHY <span style="font-weight:100; color:#64748b;">CAPITAL</span></h1>
            <div class="sync-info">Asset Portal | All Values USD (0.72 FX)</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 11px; color: #4ade80; font-weight: bold;">SYSTEM STATUS: LIVE</div>
            <div class="sync-info">LAST SYNC: <span id="sync-time">---</span></div>
        </div>
    </div>
    <table>
        <thead>
            <tr>
                <th>UID</th>
                <th>Reg</th>
                <th>Asset Details</th>
                <th>Bid Expiry</th>
                <th>Bid/Price</th>
                <th>FMV Spread</th>
                <th>HIC Success Fee</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="asset-table"></tbody>
    </table>
    <script>
        async function load() {
            try {
                const res = await fetch('/api/assets');
                const data = await res.json();
                if(data.lastSync) document.getElementById('sync-time').innerText = new Date(data.lastSync).toLocaleTimeString();
                
                document.getElementById('asset-table').innerHTML = data.assets.map(a => `
                    <tr>
                        <td style="font-family:monospace; color:#64748b; font-size:11px;">${a.uid}</td>
                        <td>${a.province}</td>
                        <td> <span class="tag" style="background: ${a.category === 'Aircraft' ? '#fbbf24' : '#38bdf8'}">${a.category || 'Heavy'}</span><strong>${a.unit_name}</strong></td>
                        <td class="${a.expiry_date?.includes('Mar. 28') || a.expiry_date?.includes('Mar. 29') ? 'stale' : ''}">${a.expiry_date || 'N/A'}</td>
                        <td>$${Math.round(a.current_bid).toLocaleString()}</td>
                        <td style="color:#38bdf8; font-weight:bold;">$${Math.round(a.market_value - a.current_bid).toLocaleString()}</td>
                        <td><span class="fee-pill">$${Math.round(a.hic_fee).toLocaleString()}</span></td>
                        <td><a href="${a.item_url}" target="_blank" style="color:#38bdf8; text-decoration:none; font-weight:bold;">DATA SOURCE</a></td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }
        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
